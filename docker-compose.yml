services:
  webpreview_bot:
    container_name: deltachat_webpreview_bot
    build: .
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./data:/app/data
      - ./webpreview:/root/.config/webpreview
    environment:
      - DC_DB_DIR=/app/data
      - DB_PATH=/app/data/webpreview.db
      - TZ=UTC
      - ALLOWED_BOT_EMAILS=${ALLOWED_BOT_EMAILS:-}
      - KARAKEEP_URL=${KARAKEEP_URL:-}
      - KARAKEEP_API_KEY=${KARAKEEP_API_KEY:-}
      - KARAKEEP_TAGS=${KARAKEEP_TAGS:-}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - JINA_PROXY_URL=${JINA_PROXY_URL:-}
      - PROXY_URL=${PROXY_URL:-}
      - PROXY_DOMAINS=${PROXY_DOMAINS:-}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
