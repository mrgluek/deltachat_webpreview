services:
  webpreview_bot:
    container_name: deltachat_webpreview_bot
    build: .
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./data:/app/data
      - ./webpreview:/root/.config/webpreview
    environment:
      - DC_DB_DIR=/app/data
      - DB_PATH=/app/data/webpreview.db
      - TZ=UTC
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
